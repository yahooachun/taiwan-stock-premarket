<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股 06:00 盤前戰鬥看板</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // 模擬 Lucide 圖標元件 (因為 CDN 版用法不同)
        const Icon = ({ name, size = 18, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [data, setData] = useState({
                lastUpdate: "2026/04/10 06:00:00 (預覽模式)",
                usMarket: { 
                    tsmcAdr: 1.92, 
                    sox: 2.15, 
                    nasdaq: 2.80, 
                    dow: 2.85, 
                    nvda: 1.87 
                },
                currency: { 
                    current: 31.789, 
                    prev1600: 31.972, 
                    change: -0.183 
                },
                marketNews: "美股電子盤強勁，中東局勢趨緩，亞太晶片股預計集體噴發。",
                tradingPlan: { 
                    openHigh: "預計開高 300 點。9:15 前若不破 09:05 低點可續抱，外資今日必大買。", 
                    openLow: "除非匯率反轉貶值，否則回檔皆為外資佈局買點。", 
                    stopLoss: "以昨日收盤價（或昨日低點 -2%）為嚴格防線。" 
                }
            });

            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('./data.json');
                        if (response.ok) {
                            const json = await response.json();
                            setData(json);
                        }
                    } catch (err) {
                        console.warn("目前使用內置數據運行。");
                    } finally {
                        setTimeout(() => setLoading(false), 800);
                    }
                };
                fetchData();
            }, []);

            const currencyAnalysis = useMemo(() => {
                const diff = data.currency.current - data.currency.prev1600;
                if (diff <= -0.1) return { status: '外資大舉流入 (強升)', color: 'text-red-500', icon: 'trending-up' };
                if (diff <= -0.05) return { status: '外資穩定流入', color: 'text-red-400', icon: 'trending-up' };
                if (diff >= 0.05) return { status: '外資流出 (貶值)', color: 'text-green-500', icon: 'trending-down' };
                return { status: '匯率盤整中', color: 'text-gray-500', icon: 'activity' };
            }, [data]);

            if (loading) {
                return (
                    <div className="flex flex-col h-screen items-center justify-center bg-slate-50">
                        <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mb-4"></div>
                        <div className="text-slate-500 font-medium animate-pulse">正在掃描 06:00 全球戰鬥數據...</div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-slate-900 flex items-center gap-2">
                                <Icon name="zap" className="text-yellow-500 fill-yellow-500" /> 台股盤前戰鬥看板
                            </h1>
                            <p className="text-slate-500 mt-1">
                                <span className="bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded text-xs font-bold mr-2">AUTO</span>
                                數據驅動交易劇本 • 高手開盤五步驟整合
                            </p>
                        </div>
                        <div className="flex flex-col items-end">
                            <div className="px-4 py-2 bg-white border border-slate-200 rounded-lg shadow-sm text-sm font-mono flex items-center gap-2">
                                <Icon name="activity" className="text-indigo-500" /> 更新時間：{data.lastUpdate}
                            </div>
                        </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2 space-y-6">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="font-bold flex items-center gap-2"><Icon name="globe" className="text-indigo-500" /> 美股昨日表現</h3>
                                        <span className="px-2 py-1 rounded text-xs font-bold bg-red-100 text-red-700">強勢噴發</span>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex justify-between items-center">
                                            <span className="text-slate-500">台積電 ADR</span>
                                            <span className="font-mono font-bold text-lg text-red-500">+{data.usMarket.tsmcAdr}%</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-slate-500">費城半導體 (SOX)</span>
                                            <span className="font-mono text-red-500">+{data.usMarket.sox}%</span>
                                        </div>
                                        <div className="flex justify-between items-center">
                                            <span className="text-slate-500">NVIDIA (NVDA)</span>
                                            <span className="font-mono text-red-500">+{data.usMarket.nvda}%</span>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                    <h3 className="font-bold flex items-center gap-2 mb-4"><Icon name="dollar-sign" className="text-emerald-500" /> 匯率腳印</h3>
                                    <div className="text-center py-2 bg-slate-50 rounded-xl mb-4 border border-slate-100">
                                        <div className={`text-xl font-bold flex items-center justify-center gap-2 ${currencyAnalysis.color}`}>
                                            <Icon name={currencyAnalysis.icon} /> {currencyAnalysis.status}
                                        </div>
                                    </div>
                                    <div className="text-sm space-y-2">
                                        <div className="flex justify-between items-center border-b border-dashed pb-1">
                                            <span className="text-slate-500">目前匯率</span>
                                            <span className="font-mono font-bold">{data.currency.current}</span>
                                        </div>
                                        <div className="flex justify-between items-center text-slate-400">
                                            <span>昨收匯率</span>
                                            <span className="font-mono">{data.currency.prev1600}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-indigo-600 border-b pb-2"><Icon name="shield-alert" /> 今日戰鬥劇本</h3>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm">
                                    <div className="p-4 bg-red-50/50 rounded-xl border border-red-100">
                                        <div className="font-bold text-red-600 mb-2">劇本 A：開高</div>
                                        <p className="text-slate-700">{data.tradingPlan.openHigh}</p>
                                    </div>
                                    <div className="p-4 bg-green-50/50 rounded-xl border border-green-100">
                                        <div className="font-bold text-green-600 mb-2">劇本 B：開低</div>
                                        <p className="text-slate-700">{data.tradingPlan.openLow}</p>
                                    </div>
                                    <div className="p-4 bg-blue-50/50 rounded-xl border border-blue-100">
                                        <div className="font-bold text-blue-600 mb-2">戰鬥防線</div>
                                        <p className="text-slate-700 font-bold">{data.tradingPlan.stopLoss}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-orange-600">
                                    <Icon name="bar-chart-3" /> 空頭認輸掃描器
                                </h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div className="border border-slate-100 p-3 rounded-xl flex justify-between items-center hover:bg-slate-50 transition cursor-pointer">
                                        <div>
                                            <div className="font-bold text-slate-900">2330 台積電</div>
                                            <div className="text-[10px] text-slate-400">借券連三減 + 守月線</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-red-500 font-mono font-bold">-1,240 張</div>
                                        </div>
                                    </div>
                                    <div className="border border-slate-100 p-3 rounded-xl flex justify-between items-center hover:bg-slate-50 transition cursor-pointer">
                                        <div>
                                            <div className="font-bold text-slate-900">2454 聯發科</div>
                                            <div className="text-[10px] text-slate-400">底部不再破底</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-red-500 font-mono font-bold">-580 張</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-slate-900 text-white p-6 rounded-2xl shadow-lg border-t-4 border-t-yellow-400">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-yellow-400"><Icon name="check-circle-2" /> 06:00 核心觀點</h3>
                                <p className="text-sm leading-relaxed text-slate-300 bg-white/5 p-3 rounded-lg border border-white/10">{data.marketNews}</p>
                            </div>
                            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                                <h3 className="font-bold mb-4 flex items-center gap-2 text-blue-500"><Icon name="users" /> 隔日沖監控</h3>
                                <div className="space-y-2">
                                    <div className="flex items-center justify-between p-2 rounded bg-red-50 text-sm font-bold"><span>凱基-台北</span><span className="text-[10px] text-red-600">警戒</span></div>
                                    <div className="flex items-center justify-between p-2 rounded bg-purple-50 text-sm font-bold"><span>兆豐-嘉義</span><span className="text-[10px] text-purple-600">佈局</span></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer className="text-center text-slate-400 text-[10px] mt-12 pt-6 border-t border-slate-200">
                        高手戰鬥系統版本 v2.1 • © 2026 自動化盤前分析
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
